name: Build recipe-exporter mod

on:
  workflow_dispatch:
  push:
    paths:
      - "recipe-exporter/versions/**"
      - ".github/workflows/recipe-exporter-mod.yml"

jobs:
  build-mod-jar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build Forge exporter mod
        working-directory: recipe-exporter/versions/1.7.10
        run: gradle copyExportJar --no-daemon

      - name: Upload mod jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-exporter-1.7.10
          path: recipe-exporter/dist/recipe-exporter-1.7.10.jar
          if-no-files-found: error
