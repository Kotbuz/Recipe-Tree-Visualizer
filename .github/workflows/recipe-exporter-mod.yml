name: Build recipe-exporter mod

# Manual only — mod is built locally; avoids red CI on every push to recipe-exporter/.
on:
  workflow_dispatch:

jobs:
  build-mod-jar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"
          cache-read-only: false

      - name: Verify vendored RetroFuturaGradle
        working-directory: recipe-exporter/versions/1.7.10
        run: |
          test -f vendor-maven/com/gtnewhorizons/retrofuturagradle/1.4.9/retrofuturagradle-1.4.9.jar

      - name: Build Forge exporter mod
        working-directory: recipe-exporter/versions/1.7.10
        run: chmod +x gradlew && ./gradlew copyExportJar --no-daemon --stacktrace

      - name: Upload mod jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-exporter-1.7.10
          path: recipe-exporter/dist/recipe-exporter-1.7.10.jar
          if-no-files-found: error
