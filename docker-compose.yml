services:
  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      ALLOWED_ROOTS: /data/minecraft
      RENDER_TIMEOUT_MS: 600000
    volumes:
      - ./MinecraftVersions:/data/minecraft:rw
    ports:
      - "3001:3001"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MINECRAFT_VERSIONS_DIR: /app/MinecraftVersions
      RENDERER_URL: http://renderer:3001
      RENDERER_MINECRAFT_ROOT: /data/minecraft
      MINECRAFT_DEFAULT_VERSION: "26.2"
      VANILLA_ICON_RENDER_ON_STARTUP: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost
    volumes:
      - ./MinecraftVersions:/app/MinecraftVersions:rw
      - ./backend/logs:/app/backend/logs
    ports:
      - "8000:8000"
    depends_on:
      renderer:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
