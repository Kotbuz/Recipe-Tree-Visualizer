services:
  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      ALLOWED_ROOTS: /data/minecraft
      RENDER_TIMEOUT_MS: 600000
      MINECRAFT_VERSION: "1.21.4"
    volumes:
      - ./MinecraftVersions:/data/minecraft:rw
    ports:
      - "3001:3001"
    restart: unless-stopped

  recipe-exporter:
    profiles: ["legacy-recipes"]
    build:
      context: ./recipe-exporter
      dockerfile: docker/Dockerfile
    environment:
      PORT: 8090
      MINECRAFT_ROOT: /data/minecraft
      FORGE_JAVA_XMX: 4G
      EXPORT_TIMEOUT_SECONDS: 1800
      FORGE_RUNTIME_ROOT: /opt/forge-runtime
    volumes:
      - ./MinecraftVersions:/data/minecraft:rw
      - ./recipe-exporter/forge-runtime/1.7.10:/opt/forge-runtime:ro
    ports:
      - "8090:8090"
    restart: unless-stopped

  recipe-exporter-neo:
    build:
      context: ./recipe-exporter-neo
      dockerfile: docker/Dockerfile
    environment:
      PORT: 8091
      NEOFORGE_JAVA_XMX: 8G
      EXPORT_TIMEOUT_SECONDS: 3600
      SUPPORTED_MINECRAFT_VERSIONS: "1.21.1"
    volumes:
      - ./MinecraftVersions:/data/minecraft:rw
      # Раскомментируйте после INSTANCES_HOST_PATH в .env:
      # - ${INSTANCES_HOST_PATH}:/host/instances:ro
    ports:
      - "8091:8091"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MINECRAFT_VERSIONS_DIR: /app/MinecraftVersions
      RENDERER_URL: http://renderer:3001
      RENDERER_MINECRAFT_ROOT: /data/minecraft
      RECIPE_EXPORTER_URL: http://recipe-exporter:8090
      RECIPE_EXPORTER_MODE: auto
      NEO_RECIPE_EXPORTER_URL: http://recipe-exporter-neo:8091
      MINECRAFT_DEFAULT_VERSION: "26.2"
      VANILLA_ICON_RENDER_ON_STARTUP: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost
    volumes:
      - ./MinecraftVersions:/app/MinecraftVersions:rw
      - ./backend/logs:/app/backend/logs
      # После INSTANCES_HOST_PATH в .env раскомментируйте:
      # - ${INSTANCES_HOST_PATH}:/host/instances:ro
    ports:
      - "8000:8000"
    depends_on:
      renderer:
        condition: service_healthy
      recipe-exporter-neo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
