server {
    listen 80;
    server_name localhost;

    # Mod .jar files are often tens of MB; nginx default is 1m (413 Payload Too Large).
    client_max_body_size 256m;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(recipes|mods|items|graph|health|versions|modpack|docs|redoc|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /item/ {
        alias /usr/share/nginx/minecraft/item-textures/;
    }

    location /block/ {
        alias /usr/share/nginx/minecraft/block-textures/;
    }
}
