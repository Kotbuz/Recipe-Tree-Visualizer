plugins {
    id "java"
    id "com.github.johnrengelman.shadow" version "8.1.1"
}

group = "com.rtv"
version = "1.7.10"

repositories {
    mavenCentral()
}

dependencies {
    implementation "info.picocli:picocli:4.7.6"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

tasks.shadowJar {
    archiveBaseName.set("recipe-exporter")
    archiveClassifier.set("1.7.10")
    manifest {
        attributes "Main-Class": "com.rtv.export.RecipeExporterCli"
    }
}

tasks.build {
    dependsOn tasks.shadowJar
}
